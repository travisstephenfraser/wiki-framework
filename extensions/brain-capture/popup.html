<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brain Vault Capture</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-label="Brain vault capture">
        <img class="brain-mark" src="assets/obsidian-brain.png" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Obsidian Wiki</p>
          <p class="lede">Turn this page into raw memory.</p>
        </div>
      </section>

      <section class="target-card">
        <div>
          <div class="label-row">
            <p class="label">Capture target</p>
            <button id="pathHelp" class="help-button" type="button" aria-label="Show command to find raw vault path">?</button>
          </div>
          <p id="folderStatus" class="folder-status">No _raw folder selected</p>
        </div>
        <button id="chooseFolder" class="secondary" type="button">Choose vault/_raw</button>
      </section>

      <section id="pathPanel" class="path-panel" hidden>
        <div class="path-panel-header">
          <p>Run from anywhere inside this repo</p>
          <span id="copyStatus">Copied</span>
        </div>
        <code id="pathCommand"></code>
      </section>

      <label class="field">
        <span>Paste blurb here</span>
        <textarea id="note" rows="3" placeholder="Add your short context, summary, or why this matters."></textarea>
      </label>

      <button id="capture" class="primary" type="button">
        <span class="pulse" aria-hidden="true"></span>
        Capture current page
      </button>

      <p id="status" class="status" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
